<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RetallAI Bridge — Live Call Tester</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: #1a1d27;
        border: 1px solid #2d3148;
        border-radius: 16px;
        padding: 36px;
        width: 480px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }
      h1 {
        font-size: 1.3rem;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .subtitle {
        font-size: 0.82rem;
        color: #64748b;
        margin-bottom: 28px;
      }
      .field {
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-size: 0.78rem;
        color: #94a3b8;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        background: #0f1117;
        border: 1px solid #2d3148;
        border-radius: 8px;
        padding: 10px 14px;
        color: #e2e8f0;
        font-size: 0.9rem;
        outline: none;
      }
      input:focus {
        border-color: #6366f1;
      }
      .btn {
        width: 100%;
        padding: 13px;
        border-radius: 10px;
        border: none;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
        margin-top: 8px;
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .btn-start {
        background: #6366f1;
        color: #fff;
      }
      .btn-stop {
        background: #ef4444;
        color: #fff;
        display: none;
      }
      .status-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 24px;
        padding: 12px 16px;
        background: #0f1117;
        border-radius: 10px;
        border: 1px solid #2d3148;
        font-size: 0.85rem;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #374151;
        flex-shrink: 0;
      }
      .dot.idle {
        background: #374151;
      }
      .dot.pending {
        background: #f59e0b;
        animation: pulse 1s infinite;
      }
      .dot.live {
        background: #22c55e;
        animation: pulse 1s infinite;
      }
      .dot.error {
        background: #ef4444;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      .log {
        margin-top: 20px;
        background: #0f1117;
        border: 1px solid #2d3148;
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 0.76rem;
        font-family: "Menlo", "Monaco", monospace;
        color: #94a3b8;
        max-height: 220px;
        overflow-y: auto;
      }
      .log .entry {
        padding: 2px 0;
        border-bottom: 1px solid #1a1d27;
      }
      .log .entry.ok {
        color: #22c55e;
      }
      .log .entry.err {
        color: #ef4444;
      }
      .log .entry.info {
        color: #94a3b8;
      }
      .log .entry.recv {
        color: #818cf8;
      }
      .meters {
        display: flex;
        gap: 12px;
        margin-top: 16px;
      }
      .meter {
        flex: 1;
        background: #0f1117;
        border: 1px solid #2d3148;
        border-radius: 10px;
        padding: 10px 14px;
      }
      .meter-label {
        font-size: 0.72rem;
        color: #64748b;
        margin-bottom: 6px;
      }
      .meter-bar-bg {
        background: #1e2235;
        border-radius: 4px;
        height: 6px;
        overflow: hidden;
      }
      .meter-bar {
        height: 100%;
        border-radius: 4px;
        width: 0%;
        transition: width 0.1s;
      }
      .meter-bar.send {
        background: #6366f1;
      }
      .meter-bar.recv {
        background: #22c55e;
      }
      .meter-num {
        font-size: 0.72rem;
        color: #e2e8f0;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🎙 RetallAI Live Call Tester</h1>
      <p class="subtitle">Uses Retell official SDK — real mic &amp; speaker</p>

      <button class="btn btn-start" id="btnStart">Start Call</button>
      <button class="btn btn-stop" id="btnStop">End Call</button>

      <div class="status-bar">
        <div class="dot idle" id="dot"></div>
        <span id="statusText">Idle — click Start Call to begin</span>
      </div>

      <div class="log" id="log"></div>

      <div
        id="transcript"
        style="
          margin-top: 16px;
          padding: 12px 14px;
          background: #0f1117;
          border: 1px solid #2d3148;
          border-radius: 10px;
          font-size: 0.82rem;
          max-height: 160px;
          overflow-y: auto;
          color: #94a3b8;
          line-height: 1.6;
        "
      >
        <em style="color: #4b5563"
          >Transcript will appear here once the call starts…</em
        >
      </div>
    </div>

    <script type="module">
      import { RetellWebClient } from "https://esm.sh/retell-client-js-sdk@2.0.8";

      const dot = document.getElementById("dot");
      const statusText = document.getElementById("statusText");
      const btnStart = document.getElementById("btnStart");
      const btnStop = document.getElementById("btnStop");
      const logEl = document.getElementById("log");
      const transcriptEl = document.getElementById("transcript");

      let retellClient = null;

      function addLog(msg, cls) {
        const d = document.createElement("div");
        d.className = "entry" + (cls ? " " + cls : "");
        d.textContent = new Date().toLocaleTimeString() + "  " + msg;
        logEl.prepend(d);
      }

      function setStatus(state, text) {
        dot.className = "dot " + state;
        statusText.textContent = text;
      }

      function updateTranscript(transcript) {
        if (!transcript || !transcript.length) return;
        transcriptEl.innerHTML = transcript
          .map(function (t) {
            var label = t.role === "agent" ? "🤖 Agent" : "🧑 You";
            var cls = t.role === "agent" ? "color:#818cf8" : "color:#e2e8f0";
            return (
              "<div style='" +
              cls +
              "'><strong>" +
              label +
              ":</strong> " +
              t.content +
              "</div>"
            );
          })
          .join("");
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
      }

      async function startCall() {
        btnStart.disabled = true;
        setStatus("pending", "Requesting call token from server…");
        addLog("POST /create-web-call…");

        var accessToken, callId;
        try {
          var resp = await fetch("/create-web-call", { method: "POST" });
          var data = await resp.json();
          if (data.error) throw new Error(data.error);
          accessToken = data.access_token;
          callId = data.call_id;
          addLog("Got access_token ✓  call_id: " + callId, "ok");
        } catch (e) {
          addLog("Failed: " + e.message, "err");
          setStatus(
            "error",
            "Server error — check RETELL_API_KEY / RETELL_AGENT_ID in .env",
          );
          btnStart.disabled = false;
          return;
        }

        setStatus("pending", "Connecting to Retell AI…");
        retellClient = new RetellWebClient();

        retellClient.on("call_started", function () {
          addLog("call_started ✅ — agent is ready", "ok");
          setStatus("live", "Live — speak now, the agent is listening");
          btnStop.style.display = "block";
          btnStart.style.display = "none";
        });

        retellClient.on("call_ended", function () {
          addLog("call_ended");
          setStatus("idle", "Call ended");
          btnStop.style.display = "none";
          btnStart.style.display = "block";
          btnStart.disabled = false;
        });

        retellClient.on("agent_start_talking", function () {
          addLog("agent_start_talking 🔊");
          setStatus("live", "Agent is speaking…");
        });

        retellClient.on("agent_stop_talking", function () {
          addLog("agent_stop_talking — your turn");
          setStatus("live", "Your turn to speak");
        });

        retellClient.on("update", function (update) {
          if (update && update.transcript) updateTranscript(update.transcript);
        });

        retellClient.on("error", function (err) {
          addLog("SDK error: " + err, "err");
          setStatus("error", "Call error — see log");
          btnStop.style.display = "none";
          btnStart.style.display = "block";
          btnStart.disabled = false;
        });

        try {
          await retellClient.startCall({ accessToken: accessToken });
        } catch (e) {
          addLog("startCall failed: " + e.message, "err");
          setStatus("error", "Could not start call");
          btnStart.disabled = false;
        }
      }

      function stopCall() {
        addLog("Ending call…");
        if (retellClient) retellClient.stopCall();
      }

      btnStart.addEventListener("click", startCall);
      btnStop.addEventListener("click", stopCall);
    </script>
  </body>
</html>
